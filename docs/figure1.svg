<circle cx="542.7" cy="277.6" r="6" fill="#2f7d8f" stroke="#2f7d8f" stroke-width="1"/>
<text x="152" y="281.6" font-size="13" fill="#2b2b2b" text-anchor="end">Stars-B</text>
<text x="542.7" y="266.6" font-size="10.5" fill="#555" text-anchor="middle">+0.58  (n=23)</text>
<line x1="636.4" y1="320.0" x2="789.7" y2="320.0" stroke="#2f7d8f" stroke-width="2" opacity="0.45"/>
<line x1="636.4" y1="316.0" x2="636.4" y2="324.0" stroke="#2f7d8f" stroke-width="2" opacity="0.55"/>
<line x1="789.7" y1="316.0" x2="789.7" y2="324.0" stroke="#2f7d8f" stroke-width="2" opacity="0.55"/>
<circle cx="725.8" cy="320.0" r="7" fill="#2f7d8f" stroke="#2f7d8f" stroke-width="1"/>
<text x="152" y="324.0" font-size="13" fill="#2b2b2b" text-anchor="end">Bio-B</text>
<text x="725.8" y="309.0" font-size="10.5" fill="#555" text-anchor="middle">+1.01  (n=19)</text>
<text x="295.7" y="86" font-size="11" fill="#9c5b2e" text-anchor="middle" font-weight="bold">Herbal-A pole</text>
<text x="721.5" y="86" font-size="11" fill="#2f7d8f" text-anchor="middle" font-weight="bold">Biological-B pole</text>
<text x="436.3" y="172.4" font-size="10.5" fill="#b03030" text-anchor="middle" font-style="italic">Currier-A, yet mid-gradient</text>
<text x="40" y="428" font-size="12" fill="#5a5a5a">Individual scribes traverse the axis by content — penmanship explains ~1% of the variance (unique R²: section 0.235 vs scribe 0.010).</text>
<text x="40" y="446" font-size="12" fill="#5a5a5a">The interior is a two-pole blend (one mixing parameter, ±0.08 bits); the Biological pole’s extremity is a word-repetition / self-copying effect.</text>
</svg>