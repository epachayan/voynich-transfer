<text x="152" y="154.4" font-size="13" fill="#2b2b2b" text-anchor="end">Pharma-A</text>
<text x="436.3" y="139.4" font-size="10.5" fill="#555" text-anchor="middle">+0.33  (n=16)</text>
<line x1="415.0" y1="192.8" x2="517.2" y2="192.8" stroke="#2f7d8f" stroke-width="2" opacity="0.45"/>
<line x1="415.0" y1="188.8" x2="415.0" y2="196.8" stroke="#2f7d8f" stroke-width="2" opacity="0.55"/>
<line x1="517.2" y1="188.8" x2="517.2" y2="196.8" stroke="#2f7d8f" stroke-width="2" opacity="0.55"/>
<circle cx="461.8" cy="192.8" r="6" fill="#2f7d8f" stroke="#2f7d8f" stroke-width="1"/>
<text x="152" y="196.8" font-size="13" fill="#2b2b2b" text-anchor="end">Cosmo-B</text>
<text x="461.8" y="181.8" font-size="10.5" fill="#555" text-anchor="middle">+0.39  (n=4)</text>
<line x1="300.0" y1="235.2" x2="581.0" y2="235.2" stroke="#2f7d8f" stroke-width="2" opacity="0.45"/>
<line x1="300.0" y1="231.2" x2="300.0" y2="239.2" stroke="#2f7d8f" stroke-width="2" opacity="0.55"/>
