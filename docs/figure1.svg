<text x="615.1" y="368" font-size="11" fill="#666" text-anchor="middle">0.75</text>
<line x1="721.5" y1="348" x2="721.5" y2="353" stroke="#888"/>
<text x="721.5" y="368" font-size="11" fill="#666" text-anchor="middle">1.00</text>
<text x="498" y="388" font-size="12" fill="#444" text-anchor="middle" font-style="italic">register coordinate  (o-attachment  →  q-gallows + e-cascade)</text>
