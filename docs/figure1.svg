<circle cx="474.6" cy="235.2" r="6" fill="#2f7d8f" stroke="#2f7d8f" stroke-width="1"/>
<text x="152" y="239.2" font-size="13" fill="#2b2b2b" text-anchor="end">Herbal-B</text>
<text x="474.6" y="224.2" font-size="10.5" fill="#555" text-anchor="middle">+0.42  (n=32)</text>
<line x1="415.0" y1="277.6" x2="674.7" y2="277.6" stroke="#2f7d8f" stroke-width="2" opacity="0.45"/>
